name: Update eBird Observations

on:
  schedule:
    - cron: '0 9 * * *'
    - cron: '0 18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch eBird observations
        env:
          EBIRD_API_KEY: ${{ secrets.EBIRD_API_KEY }}
        run: python scripts/fetch_data.py

      - name: Commit and push updated data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git add data/observations.json
          if git diff --staged --quiet; then
            echo "No changes — observations.json is already up to date."
          else
            git commit -m "🐦 Update eBird observations [$(date -u +'%Y-%m-%d %H:%M UTC')]"
            git push
          fi